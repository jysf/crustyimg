name: CI

# Enforces the build/test/clippy/fmt gates on the three-OS matrix (DEC-009).
# No secrets are used (constraint no-secrets-in-code).
on:
  push:
  pull_request:

jobs:
  check:
    # The default build now includes `display` (viuer terminal preview) so the
    # released binary's `view` works out of the box (DEC-027, supersedes DEC-011).
    # The `lean` job below covers the headless `--no-default-features` build.
    name: build / test / clippy / fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Rustfmt (check only)
        run: cargo fmt --check

  supply-chain:
    name: supply-chain policy (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "cargo-deny (supply-chain: advisories + bans + sources + licenses, DEC-037/DEC-018)"
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses

  avif:
    name: avif feature (build / test / clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # AVIF output (SPEC-018, DEC-020) is a DEFAULT feature as of SPEC-102/
      # DEC-081, so the `check` job above already exercises it — this job now
      # pins the explicit flag as a belt-and-suspenders check that `--features
      # avif` alone (without the other defaults) still builds/tests/lints clean.
      # Pure-Rust via ravif/rav1e — no nasm / system libs needed. Single runner.
      - name: Build (--features avif)
        run: cargo build --features avif --verbose

      - name: Test (--features avif)
        run: cargo test --features avif --verbose

      - name: Clippy (--features avif, warnings as errors)
        run: cargo clippy --all-targets --features avif -- -D warnings

  webp-lossy:
    name: webp-lossy feature (build / test / clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Lossy WebP is the off-by-default `webp-lossy` feature (SPEC-020, DEC-022):
      # the `webp` crate vendors libwebp and builds it with `cc` (preinstalled on
      # ubuntu runners — no system libwebp install). Single runner (the default
      # cross-OS matrix above covers the no-feature, pure-Rust build).
      - name: Build (--features webp-lossy)
        run: cargo build --features webp-lossy --verbose

      - name: Test (--features webp-lossy)
        run: cargo test --features webp-lossy --verbose

      - name: Clippy (--features webp-lossy, warnings as errors)
        run: cargo clippy --all-targets --features webp-lossy -- -D warnings

  heic:
    name: heic feature (build / test / clippy, system libheif)
    # HEIC decode is the off-by-default `heic` feature (SPEC-062, DEC-052/DEC-056)
    # and is NEVER in a distributed artifact — this job is the only place it is
    # built. It is also the project's first feature needing a real SYSTEM library
    # (`avif` is pure-Rust; `webp-lossy` vendors libwebp via `cc`), so each runner
    # installs libheif first. libheif-sys ships PRE-GENERATED bindings, so no
    # bindgen/libclang is needed. We pin the `v1_17` API floor precisely so the
    # apt package on ubuntu-latest (libheif 1.17.x) satisfies it alongside
    # Homebrew's 1.23. Windows (libheif via vcpkg) is not supported for `heic`;
    # the default Windows binary is unaffected — a `.heic` there exits 4.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Debian/Ubuntu split libheif's codec backends into separate plugin packages.
      # `libheif-dev` alone links and PARSES a `.heic` but has no HEVC decoder, so
      # libheif fails at decode time with `UnsupportedCodec`. The libde265 plugin is
      # what actually decodes HEVC. Homebrew's libheif bundles its backends.
      - name: Install system libheif + HEVC decoder plugin (linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libheif-dev libheif-plugin-libde265

      - name: Install system libheif (macos)
        if: runner.os == 'macOS'
        run: brew install libheif

      - name: Build (--features heic)
        run: cargo build --features heic --verbose

      - name: Test (--features heic)
        run: cargo test --features heic --verbose

      - name: Clippy (--features heic, warnings as errors)
        run: cargo clippy --all-targets --features heic -- -D warnings

  lean:
    name: lean build (--no-default-features)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Display is on by default (DEC-027); this job keeps the headless / server
      # build (no viuer tree) green so it does not bit-rot — the mirror of the
      # guarantee DEC-011 used to give the default build.
      - name: Build (--no-default-features)
        run: cargo build --no-default-features --verbose

      - name: Test (--no-default-features)
        run: cargo test --no-default-features --verbose

      - name: Clippy (--no-default-features, warnings as errors)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  msrv:
    # Verify the declared rust-version floor (SPEC-041, DEC-040). Pins the exact
    # toolchain declared in Cargo.toml [package] rust-version = "1.90.0" so the
    # floor is CI-enforced. 1.90.0 is the true floor of the pinned dependency tree
    # (avif-parse 2.1.0 -> 1.90 via the SPEC-058/DEC-053 AVIF decode path; was 1.89
    # via yuvxyb-math/ssimulacra2; image 0.25 -> 1.88; fast_image_resize -> 1.87).
    # Covers both the default build and the lean (--no-default-features) build.
    name: msrv (rust 1.90.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.90.0 toolchain
        uses: dtolnay/rust-toolchain@1.90.0

      - name: Build (default features)
        run: cargo build --verbose

      - name: Build (--no-default-features, lean/headless)
        run: cargo build --no-default-features --verbose

  cost-data:
    name: cost-capture audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cost-audit (shipped specs have build/verify cost; AGENTS §4)
        run: ./scripts/cost-audit.sh

  metadata:
    name: front-matter validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Strict-parse every YAML front-matter block so a malformed one fails fast
      # here instead of being silently dropped by a strict-YAML consumer. Ruby
      # (stdlib yaml) is preinstalled on ubuntu-latest — no setup step needed.
      - name: validate front-matter (strict YAML parse of all declared state)
        run: ./scripts/validate-frontmatter.sh

# Follow-up: a `--features mozjpeg` job (DEC-009) is deferred until the codec
# feature exists (DEC-004). No codec dependency is present yet, so there is no
# feature to build here; this lands with the spec that introduces it.
