name: CI

# Enforces the build/test/clippy/fmt gates on the three-OS matrix (DEC-009).
# No secrets are used (constraint no-secrets-in-code).
on:
  push:
  pull_request:

jobs:
  check:
    name: build / test / clippy / fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Rustfmt (check only)
        run: cargo fmt --check

  licenses:
    name: license policy (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cargo-deny (license policy, DEC-018)
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check licenses

# Follow-up: a `--features mozjpeg` job (DEC-009) is deferred until the codec
# feature exists (DEC-004). No codec dependency is present yet, so there is no
# feature to build here; this lands with the spec that introduces it.
