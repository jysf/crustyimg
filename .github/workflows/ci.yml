name: CI

# Enforces the build/test/clippy/fmt gates on the three-OS matrix (DEC-009).
# No secrets are used (constraint no-secrets-in-code).
on:
  push:
  pull_request:

jobs:
  check:
    # The default build now includes `display` (viuer terminal preview) so the
    # released binary's `view` works out of the box (DEC-027, supersedes DEC-011).
    # The `lean` job below covers the headless `--no-default-features` build.
    name: build / test / clippy / fmt
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Build
        run: cargo build --verbose

      - name: Test
        run: cargo test --verbose

      - name: Clippy (warnings as errors)
        run: cargo clippy --all-targets -- -D warnings

      - name: Rustfmt (check only)
        run: cargo fmt --check

  supply-chain:
    name: supply-chain policy (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: "cargo-deny (supply-chain: advisories + bans + sources + licenses, DEC-037/DEC-018)"
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources licenses

  avif:
    name: avif feature (build / test / clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # AVIF output is the off-by-default `avif` feature (SPEC-018, DEC-020):
      # pure-Rust via ravif/rav1e — no nasm / system libs needed. Single runner
      # (the default cross-OS matrix above already covers the no-feature build).
      - name: Build (--features avif)
        run: cargo build --features avif --verbose

      - name: Test (--features avif)
        run: cargo test --features avif --verbose

      - name: Clippy (--features avif, warnings as errors)
        run: cargo clippy --all-targets --features avif -- -D warnings

  webp-lossy:
    name: webp-lossy feature (build / test / clippy)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Lossy WebP is the off-by-default `webp-lossy` feature (SPEC-020, DEC-022):
      # the `webp` crate vendors libwebp and builds it with `cc` (preinstalled on
      # ubuntu runners — no system libwebp install). Single runner (the default
      # cross-OS matrix above covers the no-feature, pure-Rust build).
      - name: Build (--features webp-lossy)
        run: cargo build --features webp-lossy --verbose

      - name: Test (--features webp-lossy)
        run: cargo test --features webp-lossy --verbose

      - name: Clippy (--features webp-lossy, warnings as errors)
        run: cargo clippy --all-targets --features webp-lossy -- -D warnings

  lean:
    name: lean build (--no-default-features)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable toolchain (clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Display is on by default (DEC-027); this job keeps the headless / server
      # build (no viuer tree) green so it does not bit-rot — the mirror of the
      # guarantee DEC-011 used to give the default build.
      - name: Build (--no-default-features)
        run: cargo build --no-default-features --verbose

      - name: Test (--no-default-features)
        run: cargo test --no-default-features --verbose

      - name: Clippy (--no-default-features, warnings as errors)
        run: cargo clippy --all-targets --no-default-features -- -D warnings

  msrv:
    # Verify the declared rust-version floor (SPEC-041, DEC-040). Pins the exact
    # toolchain declared in Cargo.toml [package] rust-version = "1.89.0" so the
    # floor is CI-enforced. 1.89.0 is the true floor of the pinned dependency tree
    # (yuvxyb-math 0.1.1 -> 1.89 via ssimulacra2; image 0.25 -> 1.88;
    # fast_image_resize 5.5 -> 1.87). Covers both the default build and the lean
    # (--no-default-features / headless) build per DEC-027.
    name: msrv (rust 1.89.0)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.89.0 toolchain
        uses: dtolnay/rust-toolchain@1.89.0

      - name: Build (default features)
        run: cargo build --verbose

      - name: Build (--no-default-features, lean/headless)
        run: cargo build --no-default-features --verbose

  cost-data:
    name: cost-capture audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: cost-audit (shipped specs have build/verify cost; AGENTS §4)
        run: ./scripts/cost-audit.sh

# Follow-up: a `--features mozjpeg` job (DEC-009) is deferred until the codec
# feature exists (DEC-004). No codec dependency is present yet, so there is no
# feature to build here; this lands with the spec that introduces it.
