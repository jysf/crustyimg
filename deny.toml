# cargo-deny — full supply-chain policy enforcement (DEC-037, DEC-018).
#
# Checks four axes: advisories (RUSTSEC vulnerabilities + unmaintained + yanked),
# bans (duplicate/blocked crates), sources (only crates.io), licenses (permissive).
# Run locally with `just deny`.
#
# crustyimg is distributed under `MIT OR Apache-2.0` (permissive) so the binary
# stays widely embeddable, including in closed-source/commercial products. To
# keep that promise, every dependency must carry a permissive (or an explicitly
# excepted) license. Any GPL/AGPL — or any license not in `allow` and not
# excepted — fails `cargo deny check licenses` (and the CI supply-chain job).
#
# This is the mechanical enforcement of constraint `no-agpl-default-deps`.
# Run locally with `just deny`.

[graph]
# Evaluate the FULL feature graph (incl. the optional `display` feature, DEC-011)
# so a copyleft dependency cannot slip in behind a feature flag unnoticed.
all-features = true

[licenses]
# Permissive SPDX licenses present in — or acceptable for — the dependency tree.
# Each `OR` expression a crate declares is satisfied if ANY listed id is allowed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
]

# Per-crate exceptions: a license OUTSIDE `allow`, knowingly accepted for ONE
# named crate. Everything else still fails — including any NEW GPL/AGPL/LGPL dep.
#
#   ansi_colours (LGPL-3.0-or-later): pulled in ONLY by `viuer` behind the
#   optional `display` feature (DEC-011), for ANSI color conversion in the
#   `view` terminal-display path. LGPL is weak copyleft — it does NOT relicense
#   crustyimg the way GPL/AGPL would. Accepted for the display build only.
#   Revisit if the `view`/viuer path is reworked or display becomes default.
#   libfuzzer-sys ((MIT OR Apache-2.0) AND NCSA): a FUZZ-ONLY transitive of
#   `rav1e`, pulled into the graph ONLY when the optional `avif` feature is on
#   (SPEC-018, DEC-020). It is NOT part of the shipped `--features avif` binary
#   (`cargo tree -e normal --features avif` shows no libfuzzer-sys). NCSA is a
#   permissive, OSI/FSF-approved BSD-style license. We allow it for this one
#   crate rather than adding NCSA to the global `allow` list, keeping the
#   surface minimal (the same discipline as the ansi_colours exception above).
#   avif-parse (MPL-2.0): the AVIF container parser on the DEFAULT decode path
#   (SPEC-058, DEC-053). MPL-2.0 is FILE-level weak copyleft — it obliges only
#   sharing modifications to avif-parse's own source, and does NOT relicense our
#   statically-linked `MIT OR Apache-2.0` binary the way GPL/AGPL would. Accepted
#   for this one crate (the same discipline as ansi_colours). The AV1 decoder it
#   feeds, `re_rav1d`, is BSD-2-Clause and needs no exception. Revisit if we
#   migrate to `image`'s built-in pure-Rust AVIF decode (image-rs #2621).
#   to_method (CC0-1.0): a tiny utility crate pulled by `re_rav1d` (SPEC-058,
#   DEC-053). CC0-1.0 is a public-domain DEDICATION — the same permissive tier as
#   `Unlicense`/`0BSD` (already globally allowed) and imposes no source or
#   relicensing obligation on our binary. Excepted per-crate rather than widened
#   into the global `allow` list, keeping the license surface minimal (the same
#   discipline as the exceptions above). Drops out if we shed the `re_rav1d` dep.
#   notify (CC0-1.0): the filesystem watcher behind the default-on `watch` feature
#   (`build --watch`, SPEC-067, DEC-060). CC0-1.0 is a public-domain DEDICATION —
#   the same permissive tier as `to_method` above and `Unlicense`/`0BSD` (already
#   globally allowed), imposing NO source or relicensing obligation on our binary.
#   Excepted per-crate rather than widening the global `allow` list (the same
#   minimal-surface discipline as the exceptions above). Drops out of the lean
#   `--no-default-features` build entirely.
#   inotify / inotify-sys (ISC): notify's LINUX backend (SPEC-067, DEC-060). ISC is
#   an OSI-approved / FSF-Free permissive license, functionally equivalent to the
#   already-allowed `BSD-2-Clause`/MIT (a simplified two-clause permissive with no
#   copyleft). Excepted per-crate (not globally allowed) so a FUTURE unexpected ISC
#   crate still triggers a fresh review — the same discipline as the NCSA exception.
#   Linux-only + behind the `watch` feature; absent on macOS/Windows and in the lean build.
exceptions = [
    { name = "ansi_colours", allow = ["LGPL-3.0-or-later"] },
    { name = "libfuzzer-sys", allow = ["NCSA"] },
    { name = "avif-parse", allow = ["MPL-2.0"] },
    { name = "to_method", allow = ["CC0-1.0"] },
    { name = "notify", allow = ["CC0-1.0"] },
    { name = "inotify", allow = ["ISC"] },
    { name = "inotify-sys", allow = ["ISC"] },
]

# Require high confidence when matching a license file's text to an SPDX id.
confidence-threshold = 0.9

# ---------------------------------------------------------------------------
# SPEC-036: supply-chain sections (DEC-037)
# ---------------------------------------------------------------------------

[advisories]
# Deny crates with known RUSTSEC vulnerabilities or unmaintained status.
# yanked crates are also denied (a yank is a signal the crate should not be used).
# ignore = [] — any future exception MUST be a commented, dated entry with a
# one-line reason and revisit trigger (mirrors the [licenses] exceptions discipline).
yanked = "deny"
ignore = [
    # RUSTSEC-2024-0436 — `paste` (dtolnay) is archived/unmaintained.
    # No safe upgrade exists as of 2026-07-07. Reached two ways: (1) `re_rav1d`
    # -> `paste` on the DEFAULT decode path (SPEC-058/DEC-053 — AVIF decode), and
    # (2) `rav1e` -> `ravif` -> `image`'s `avif` ENCODE feature. Both are upstream
    # deps we don't control (the `avif` feature also formerly reached it before
    # SPEC-045/DEC-046 dropped little_exif). `paste` is a compile-time-only proc
    # macro (no runtime attack surface). Revisit when `re_rav1d`/`rav1e` drop the
    # `paste` dependency, or a patch release resolves this advisory.
    { id = "RUSTSEC-2024-0436", reason = "paste is transitive via re_rav1d (default decode) and rav1e/ravif (avif encode); compile-time proc-macro, no safe upgrade 2026-07-07" },
    # RUSTSEC-2026-0192 — `ttf-parser` (harfbuzz) is unmaintained (author declared
    # EOL). Re-entered the tree via the resvg/usvg TEXT stack (usvg -> fontdb +
    # rustybuzz -> ttf-parser) that SPEC-060 adds for SVG `<text>` rasterization.
    # SPEC-044/DEC-045 previously dropped ttf-parser (skrifa/fontations), but
    # resvg's text module cannot be swapped off it without an upstream migration.
    # It is parse-time only (glyph parsing during rasterize) with no known vuln.
    # Revisit + DROP when resvg's text stack migrates onto fontations/read-fonts
    # (HarfRust — fontations#956, resvg#200); we already sit on fontations via skrifa.
    { id = "RUSTSEC-2026-0192", reason = "ttf-parser unmaintained; transitive via usvg/resvg text stack (SPEC-060/DEC-054); parse-time only, no vuln. Revisit + DROP when resvg's text stack migrates off ttf-parser to fontations/read-fonts (HarfRust) — we already sit on fontations via skrifa" },
]

[bans]
# Warn on multiple versions of the same crate (visibility without breaking the build
# on unavoidable transitive duplicates). deny/skip are empty; add narrowly-scoped
# entries here if a specific crate must be blocked or a duplicate version accepted.
multiple-versions = "warn"
deny = []
skip = []

[sources]
# Only crates.io is an allowed dependency source (DEC-037 / constraint
# untrusted-input-hardening). A git, path, or alt-registry dep fails CI.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
