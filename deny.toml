# cargo-deny — full supply-chain policy enforcement (DEC-037, DEC-018).
#
# Checks four axes: advisories (RUSTSEC vulnerabilities + unmaintained + yanked),
# bans (duplicate/blocked crates), sources (only crates.io), licenses (permissive).
# Run locally with `just deny`.
#
# crustyimg is distributed under `MIT OR Apache-2.0` (permissive) so the binary
# stays widely embeddable, including in closed-source/commercial products. To
# keep that promise, every dependency must carry a permissive (or an explicitly
# excepted) license. Any GPL/AGPL — or any license not in `allow` and not
# excepted — fails `cargo deny check licenses` (and the CI supply-chain job).
#
# This is the mechanical enforcement of constraint `no-agpl-default-deps`.
# Run locally with `just deny`.

[graph]
# Evaluate the FULL feature graph (incl. the optional `display` feature, DEC-011)
# so a copyleft dependency cannot slip in behind a feature flag unnoticed.
all-features = true

[licenses]
# Permissive SPDX licenses present in — or acceptable for — the dependency tree.
# Each `OR` expression a crate declares is satisfied if ANY listed id is allowed.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "Zlib",
    "0BSD",
    "Unlicense",
    "Unicode-3.0",
]

# Per-crate exceptions: a license OUTSIDE `allow`, knowingly accepted for ONE
# named crate. Everything else still fails — including any NEW GPL/AGPL/LGPL dep.
#
#   ansi_colours (LGPL-3.0-or-later): pulled in ONLY by `viuer` behind the
#   optional `display` feature (DEC-011), for ANSI color conversion in the
#   `view` terminal-display path. LGPL is weak copyleft — it does NOT relicense
#   crustyimg the way GPL/AGPL would. Accepted for the display build only.
#   Revisit if the `view`/viuer path is reworked or display becomes default.
#   libfuzzer-sys ((MIT OR Apache-2.0) AND NCSA): a FUZZ-ONLY transitive of
#   `rav1e`, pulled into the graph ONLY when the optional `avif` feature is on
#   (SPEC-018, DEC-020). It is NOT part of the shipped `--features avif` binary
#   (`cargo tree -e normal --features avif` shows no libfuzzer-sys). NCSA is a
#   permissive, OSI/FSF-approved BSD-style license. We allow it for this one
#   crate rather than adding NCSA to the global `allow` list, keeping the
#   surface minimal (the same discipline as the ansi_colours exception above).
exceptions = [
    { name = "ansi_colours", allow = ["LGPL-3.0-or-later"] },
    { name = "libfuzzer-sys", allow = ["NCSA"] },
]

# Require high confidence when matching a license file's text to an SPDX id.
confidence-threshold = 0.9

# ---------------------------------------------------------------------------
# SPEC-036: supply-chain sections (DEC-037)
# ---------------------------------------------------------------------------

[advisories]
# Deny crates with known RUSTSEC vulnerabilities or unmaintained status.
# yanked crates are also denied (a yank is a signal the crate should not be used).
# ignore = [] — any future exception MUST be a commented, dated entry with a
# one-line reason and revisit trigger (mirrors the [licenses] exceptions discipline).
yanked = "deny"
ignore = [
    # RUSTSEC-2024-0436 — `paste` (dtolnay) is archived/unmaintained.
    # No safe upgrade exists as of 2026-07-05; it is a transitive dep reached
    # ONLY via `rav1e` -> `ravif` -> `image`'s `avif` feature (SPEC-045/DEC-046
    # dropped little_exif, `paste`'s other former path) — upstream (`rav1e`)
    # must act first. Revisit when `rav1e` drops the `paste` dependency, or
    # when a patch release resolves this advisory.
    { id = "RUSTSEC-2024-0436", reason = "paste is transitive via rav1e/ravif (avif feature); no safe upgrade available 2026-07-05" },
]

[bans]
# Warn on multiple versions of the same crate (visibility without breaking the build
# on unavoidable transitive duplicates). deny/skip are empty; add narrowly-scoped
# entries here if a specific crate must be blocked or a duplicate version accepted.
multiple-versions = "warn"
deny = []
skip = []

[sources]
# Only crates.io is an allowed dependency source (DEC-037 / constraint
# untrusted-input-hardening). A git, path, or alt-registry dep fails CI.
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
