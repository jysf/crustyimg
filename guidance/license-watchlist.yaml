# License Watchlist — capabilities we have NOT adopted because of their LICENSE.
#
# crustyimg ships under `MIT OR Apache-2.0` and enforces a permissive-only
# dependency tree (constraint `no-agpl-default-deps`, DEC-018, `just deny`). That
# rules out some genuinely-useful libraries whose only problem is a copyleft
# (GPL/AGPL/LGPL) or otherwise non-permissive license. This file is the standing
# register of those gaps so we can later (a) find a permissive alternative that has
# since matured, or (b) decide to build one. It is the "what we gave up, and the
# way back" ledger that pairs with DEC-018's "what we enforce."
#
# PROCESS (keep this alive):
# - Whenever a DEC/spec/review rejects or defers a dependency for LICENSE reasons,
#   add an entry under `license_blocked` (do NOT silently drop it).
# - When a permissive alternative is adopted or built, set `status: resolved`, add
#   `resolved_by:` (the spec/DEC/crate), and keep the row for history.
# - Revisit on each `revisit_trigger`, and otherwise periodically (e.g. at the
#   start of a formats/quality stage). `just watchlist` prints the open items.
# - LGPL is allowed ONLY via a documented per-crate cargo-deny exception
#   (deny.toml); if we decline an LGPL/other dep rather than except it, record it here.
#
# `deferred_non_license` at the bottom tracks capability gaps deferred for OTHER
# reasons (C-dep, build cost). The primary ask was license, but these are the same
# kind of "gap to revisit," so they live here too — clearly separated.
#
# Fields:
#   id                     stable kebab-case slug
#   capability             what the user-facing feature WOULD be
#   rejected_dependency    the crate/lib we declined (and version family if relevant)
#   license / license_class the blocker (copyleft | commercial | unverified | ...)
#   reason                 why it is blocked for us specifically
#   status                 no-permissive-alternative | partial-alternative |
#                          alternative-available | needs-verification | resolved
#   current_fallback       what crustyimg does today instead
#   permissive_alternatives candidate crates/approaches (permissive) to evaluate
#   build_candidate        a sketch of building it ourselves, with rough effort
#   revisit_trigger        the condition that should make us re-open this
#   related                DECs / constraints / specs
#   confidence             how sure we are about the license claim (verify if low)

license_blocked:
  - id: high-quality-gif-quantization
    capability: "Animated/again GIF output with high-quality color quantization + dithering (far smaller / better-looking GIFs than a naive palette)."
    rejected_dependency: gifski
    license: AGPL-3.0-or-later (dual-licensed with a paid commercial option)
    license_class: copyleft
    reason: "AGPL would relicense the whole statically-linked binary; incompatible with our MIT/Apache embeddable promise. A commercial license defeats the open default."
    status: no-permissive-alternative
    current_fallback: "the `image` crate's built-in GIF encoder (works; basic palette, no advanced dithering)."
    permissive_alternatives:
      - "color_quant (MIT/Apache) — NeuQuant, already a transitive of `image`; modest quality."
      - "exoquant / imagequant-free forks — evaluate license + quality."
    build_candidate: "A permissive Wu or median-cut quantizer + Floyd–Steinberg dithering in a small `src/quantize` module (medium effort; reuses our pixel core). Would also serve indexed-PNG."
    revisit_trigger: "We add a real GIF/animation feature, OR a permissive high-quality quantizer matures."
    related: [DEC-018, DEC-004, no-agpl-default-deps]
    confidence: high

  - id: lossy-palette-quantization
    capability: "pngquant-style lossy color quantization — large size wins for indexed PNG (and GIF) at near-identical quality."
    rejected_dependency: imagequant (libimagequant)
    license: GPL-3.0-or-later (dual-licensed commercial)
    license_class: copyleft
    reason: "GPL relicenses the binary; not embeddable. Commercial license defeats the open default."
    status: no-permissive-alternative
    current_fallback: "none — crustyimg writes full-color PNG; no lossy/indexed PNG path yet. PROJ-002's format engine (SPEC-048) routes few-colour graphics to **lossless WebP** in the interim (its palette transform captures much of the win with no quantizer)."
    permissive_alternatives:
      - "quantette (MIT) — a maintained pure-Rust Wu/median-cut quantizer with dithering; the leading permissive candidate that has since matured. Evaluate quality vs libimagequant before adopting; the intended way back to indexed-PNG output."
      - "color_quant (MIT/Apache) for the palette step; permissive but lower quality than libimagequant."
    build_candidate: "Same `src/quantize` module as above (median-cut/Wu + dithering); the single biggest permissive 'PNG gets much smaller' lever we could own outright — or adopt `quantette` instead of building from scratch."
    revisit_trigger: "PROJ-007 (indexed/lossy-PNG output — deferred there by PROJ-002 scope), OR we build/adopt the quantizer sooner. Evaluate `quantette` first."
    related: [DEC-018, DEC-004, no-agpl-default-deps]
    confidence: high

  - id: lgpl-free-terminal-display
    capability: "Terminal image display (the `view` command) WITHOUT an LGPL dependency."
    rejected_dependency: "ansi_colours (LGPL-3.0-or-later), pulled by viuer behind the optional `display` feature"
    license: LGPL-3.0-or-later
    license_class: weak-copyleft
    reason: "We currently ALLOW it via a documented per-crate cargo-deny exception (DEC-018), but only for the opt-in `display` build. We'd rather not carry any copyleft at all; an in-house sink removes the exception."
    status: alternative-available
    current_fallback: "viuer behind `--features display` (carries the ansi_colours LGPL exception)."
    permissive_alternatives:
      - "Build a permissive in-house Display sink: Kitty + iTerm2 graphics protocols + `icy_sixel` (MIT) + truecolor half-block fallback — drops viuer AND ansi_colours."
    build_candidate: "The in-house Display sink above (medium effort) — already tracked in docs/backlog.md and as a DEC-018 follow-up."
    revisit_trigger: "When the `view`/display path is reworked, or we want a zero-copyleft all-features build."
    related: [DEC-018, DEC-011]
    confidence: high

  - id: jpegli-encode
    capability: "jpegli JPEG encoding — meaningfully smaller JPEGs at equal quality than the baseline encoder, while staying decodable everywhere."
    rejected_dependency: jpegli-rs (and other jpegli bindings)
    license: "UNVERIFIED — jpegli upstream lives in libjxl, which is BSD-3-Clause (permissive); the Rust binding's own license AND whether it's a C dep need confirming. The `no-agpl-default-deps` rationale lists jpegli-rs, but the upstream looks permissive — this may actually be a C-DEP deferral, not a license one."
    license_class: unverified
    reason: "Listed as ruled-out in constraints, but the license claim is not confirmed; resolve before relying on it either way."
    status: needs-verification
    current_fallback: "the `image` crate's baseline JPEG encoder (DEC-016 `-q`)."
    permissive_alternatives:
      - "If jpegli upstream is permissive: a maintained pure-Rust or vendored-C binding behind an off-by-default feature (the AVIF/libwebp pattern)."
      - "zune-jpeg / other permissive encoders — evaluate quality."
    build_candidate: "n/a until the license question is answered."
    revisit_trigger: "Before any JPEG-quality spec; verify the actual license of jpegli-rs and reclassify (license-blocked vs c-dep-deferred vs adoptable)."
    related: [DEC-016, DEC-018, no-agpl-default-deps]
    confidence: low

  - id: heic-heif-decode
    capability: "Reading `.heic`/`.heif` INPUT (iPhone / modern-camera photos) — decoding to pixels for any command, or best-effort conversion to jpg/png/webp."
    rejected_dependency: "heic (imazen, docs.rs/heic 0.1.6) — pure-Rust HEIC/HEIF decoder, SIMD, decode-only, #![forbid(unsafe_code)], 49/49 HEVC conformance; but AGPL"
    license: "AGPL-3.0-only OR LicenseRef-Imazen-Commercial (same vendor + dual-license model as imagequant / imageflow)"
    license_class: copyleft
    reason: "AGPL relicenses the statically-linked binary; incompatible with our MIT/Apache promise and `no-agpl-default-deps`; the commercial tier defeats the open default. Cannot be a default dep. Even as an opt-in feature it can NEVER appear in a DISTRIBUTED artifact (cargo-dist release / brew / crates.io) without AGPL-ing that artifact — only a user's own local build is unaffected. SECOND, INDEPENDENT blocker (see DEC-052): HEVC is covered by the Access Advance PATENT pool; a copyright license (AGPL, commercial, MIT, Apache) grants ZERO patent rights, so the exposure attaches to EVERY decode path equally. Consequence: even a mature PERMISSIVE decoder does NOT let us ship HEIC in the default binary — the patent question is separate and must be cleared with counsel. HEIC decode is therefore feature-gated (DEC-052)."
    status: partial-alternative
    current_fallback: "Pre-convert OUTSIDE crustyimg (macOS `sips`; Linux `heif-convert` from libheif-examples, or `magick`/`vips`) in the pipeline, or shell out at runtime. Invoking an external converter creates NO license obligation (invoking != linking). This is the recommended, good-enough path today. Note: HEIC has NO usable embedded-preview fallback (unlike RAW below) — the embedded thumbnail is itself HEVC-coded at ~320x240, so there is no HEVC-free image path; only real decode or nothing."
    permissive_alternatives:
      - "CORRECTION (2026-07-07): permissive pure-Rust HEVC decoders now EXIST but are IMMATURE / not HEIC-proven. `rust_h265` 0.1.0 (roticv) — MIT OR Apache-2.0 (license verified from Cargo.toml), zero deps, real pixel decoder, Main/Main10 8/10-bit 4:2:0, byte-exact vs FFmpeg; caveats: 4:2:0-only, no HDR-SEI, Annex-B-only in the published 0.1.0 (repo adds hvcC), single-author/unaudited. `media-codec-h265` 0.1.1 (Zhou Wei/libark) — MIT OR Apache-2.0, parser+decoder that explicitly lists HVCC support (the gap rust_h265 0.1.0 has), used in 6 crates; HEIC-readiness/chroma/conformance unproven. `OxideAV/oxideav-h265` 0.0.8 — MIT, very active, byte-exact incl. 4:2:2/4:4:4 + tiles, has a Main-Still-Picture test + oxideav-mp4 (ISOBMFF); v0.0.x, Fuzz CI failing. None is Wave-1-ready; none clears the PATENT blocker regardless."
      - "libheif-rs -> system libheif is the mature IN-TOOL non-AGPL path (the DEC-052 `heic` feature). libheif is LGPL-3.0-or-later (NOT 2.1); decode-only = libde265 (LGPL), exclude x265 (GPL, encode). Dynamic-link / system-lib is the clean LGPL path (attribution + license text only); static linking carries LGPLv3 §4 relink obligations. Reintroduces a C system dep (the 'is it installed' problem)."
    build_candidate: "TWO layers. (1) HEIF/ISOBMFF CONTAINER parser — tractable pure-Rust + permissive (a few k lines; reuses TIFF/box-parsing; also decodes AVIF-in-HEIF and serves Canon CR3 preview extraction). Worth building on its own merits. (2) The HEVC/H.265 intra DECODER — from-scratch still REJECTED (~24-40 person-weeks; CABAC + deblock/SAO bit-exactness the time sink), BUT permissive prior art now EXISTS to ADOPT/FORK rather than port from LGPL: forking/stripping MIT/Apache `rust_h265` (or `oxideav-h265`) to intra-only is ~4-8 person-weeks + mandatory cargo-fuzz + real-corpus validation. NOTE this only addresses the LICENSE layer; HEVC PATENT exposure is unaffected by any code license and independently keeps HEIC out of the default binary (DEC-052)."
    revisit_trigger: "Re-open DEFAULT-path HEIC only when ALL hold: (a) a permissive decoder's license confirmed [DONE: rust_h265, media-codec-h265, oxideav-h265 are MIT/Apache]; (b) hvcC + grid/tiled + HDR HEIC support PROVEN on a real iPhone corpus; (c) performance acceptable; AND (d) the HEVC PATENT question separately resolved with counsel. License maturity alone is NOT sufficient. For the OPT-IN `heic` feature: Imazen offering a permissive tier, or accepting the LGPL libheif-rs opt-in (deny exception), or a fork of rust_h265 maturing."
    related: [DEC-004, DEC-018, DEC-052, no-agpl-default-deps]
    confidence: high

  - id: raw-camera-decode
    capability: "Reading camera RAW INPUT (Nikon NEF, Canon CR2/CR3, Fuji RAF, Leica DNG/RWL, Sony ARW, generic DNG) — at minimum best-effort conversion to jpg/png/webp."
    rejected_dependency: "rawler 0.7.2 (dnglab; actively maintained, pure-Rust) / rawloader 0.37.1 — for full RAW DEVELOPMENT (demosaic + white balance + color matrix)"
    license: "LGPL-2.1 (both)"
    license_class: weak-copyleft
    reason: "LGPL is allowable ONLY behind an off-by-default feature with a documented per-crate cargo-deny exception (the ansi_colours precedent); never the default build. This blocker applies to the HIGH-QUALITY (Tier 2) development path only — NOT to the basic Tier-1 path below."
    status: alternative-available
    current_fallback: "none in-tool yet (RAW input unsupported). Externally: the camera's own JPEG, or dcraw/exiftool/libraw."
    permissive_alternatives:
      - "TIER 1 — embedded full-res JPEG preview extraction: PERMISSIVE, needs NO RAW crate. Nearly every RAW embeds a full-size JPEG (what the camera screen shows). Parse the TIFF/EXIF IFDs (`kamadak-exif`, ALREADY a dep) — or the ISOBMFF box for Canon CR3 — pull the largest embedded JPEG, re-encode via `image`. Covers Nikon/Canon-CR2/Fuji/Leica/Sony; CR3 needs box parsing (shares tech with a future HEIF container parser). No copyleft, no patents, no demosaic. The recommended 'basic conversion' build."
    build_candidate: "Tier 1 embedded-preview extractor as a decode/Source path (M, permissive, pure-Rust) — DO THIS FIRST. Tier 2 true development either via `rawler` behind an opt-in `raw` feature + deny exception (LGPL), or a from-scratch demosaic (L; Fuji X-Trans especially hard) — overkill for basic conversion."
    revisit_trigger: "A RAW-input spec in a future project wave (see docs/backlog.md). Build Tier 1 first; weigh Tier 2/`rawler` only if development-grade quality is wanted."
    related: [DEC-003, DEC-004, DEC-018]
    confidence: high

# ── Deferred for NON-license reasons (capability gaps, same revisit goal) ──────────
deferred_non_license:
  - id: avif-decode
    capability: "Reading `.avif` INPUT, and perceptual auto-quality (--target/--ssim) on AVIF output."
    deferred_dependency: dav1d (via image's `avif-native`) — permissive but a C system dep
    reason: "C/system dep contradicts the pure-Rust, zero-system-deps default (DEC-020). AVIF is output-only v1; perceptual AVIF needs this decoder."
    status: deferred
    revisit_trigger: "Demand for .avif input or perceptual AVIF; then weigh a vendored/feature-gated dav1d like webp-lossy."
    related: [DEC-020, SPEC-018]
    confidence: high

  - id: mozjpeg-encode
    capability: "mozjpeg JPEG encoding — smaller JPEGs (trellis quantization)."
    deferred_dependency: mozjpeg (via mozjpeg-sys)
    license: "permissive (BSD-3 / IJG) — NOT a license blocker"
    reason: "C dep / build cost; deferred behind a potential future feature, not declined on license."
    status: deferred
    revisit_trigger: "A JPEG-quality spec; adopt behind an off-by-default feature (the webp-lossy/libwebp pattern in DEC-022)."
    related: [DEC-016, DEC-022]
    confidence: high
