[package]
name = "crustyimg"
version = "0.1.0"
edition = "2021"
description = "A fast Rust CLI to view and transform images."
license = "MIT OR Apache-2.0"

[lib]
name = "crustyimg"
path = "src/lib.rs"

[[bin]]
name = "crustyimg"
path = "src/main.rs"

# Runtime crates arrive with the specs that use them. SPEC-002 adds the first
# two: `image` (the single pixel library, DEC-002) and `thiserror` (typed
# library errors, DEC-007). Both are pre-justified by their DECs — no new DEC.
# `image` is pinned to the pure-Rust core formats only (DEC-004,
# `pure-rust-codecs-default`): default features off, no avif/mozjpeg/native.
[dependencies]
image = { version = "=0.25.10", default-features = false, features = ["png", "jpeg", "gif", "bmp", "tiff", "ico"] }
thiserror = "=2.0.18"
glob = "=0.3.3"

[dev-dependencies]
tempfile = "=3.27.0"
