# The `product` flow (SPEC-085): the `web` flow at a compact long edge for
# product cards / catalogue shots. Same engine (downscale → orient → strip →
# fast AVIF-aware modernize → never-bigger → score), with a 1600px bound.
version = "1"
name = "product"
description = "Downscale to 1600px for product cards/thumbnails, then modernize (never bigger)."

[[step]]
op = "auto-orient"

[[step]]
op = "resize"
mode = "max"
width = 1600

[[step]]
op = "optimize"
